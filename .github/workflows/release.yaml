on:
    push:
        tags:
            - '*'

name: 📦 Release a New Version of Missive.js

permissions:
    contents: write
    id-token: write # Required for OIDC

jobs:
    build-and-test:
        uses: ./.github/workflows/build-and-tests.yaml

    release:
        name: 🚀 Release on Github
        runs-on: ubuntu-latest
        needs: ['build-and-test']
        steps:
            - name: 🏷 Create Release
              uses: actions/create-release@v1
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  tag_name: ${{ github.ref }}
                  release_name: Release ${{ github.ref }}
                  draft: false
                  prerelease: false

    publish:
        name: 🗼 Publish to NPM
        runs-on: ubuntu-latest
        needs: ['build-and-test']
        steps:
            - name: ⬇️ Checkout repo
              uses: actions/checkout@v4

            - name: ⎔ Setup node
              uses: actions/setup-node@v4
              with:
                  node-version: '20'

            - name: ⎔ Set up pnpm
              uses: pnpm/action-setup@v4

            - name: 📥 Download deps
              run: pnpm install --frozen-lockfile

            - name: 📲 Test the builds
              run: pnpm run build -F missive.js

            - name: 📢 Publish to NPM
              run: pnpm publish --provenance --access public --no-git-checks --F missive.js
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  # Use OIDC for npm authentication instead of NPM_TOKEN
                  NODE_AUTH_TOKEN: ''
                  NPM_TOKEN: ''
